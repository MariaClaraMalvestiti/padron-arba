specVersion: "3.0"
metadata:
  name: padron-arba
type: application
framework:
  name: OpenUI5
  version: "1.120.0"
  libraries:
    - name: sap.ui.core
    - name: sap.m
    - name: sap.ui.layout
    - name: sap.ui.table
    - name: sap.ui.unified
    - name: themelib_sap_horizon

server:
  customMiddleware:
    - name: ui5-middleware-simpleproxy
      afterMiddleware: compression
      mountPath: /api
      configuration:
        baseUri: "http://localhost:4004/api"
